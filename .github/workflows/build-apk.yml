# .github/workflows/build-apk.yml
name: Build Mesh Messenger APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Project Structure
      run: |
        # Create directories
        mkdir -p app/src/main/java/com/meshmessenger
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper
        
        # Copy HTML to assets
        cp index.html app/src/main/assets/
    
    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.meshmessenger">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.BLUETOOTH" />
            <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
            <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />
            <uses-permission android:name="android.permission.NEARBY_WIFI_DEVICES" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Mesh Messenger"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                android:usesCleartextTraffic="true">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize"
                    android:screenOrientation="portrait">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFESTEOF
    
    - name: Create MainActivity.java
      run: |
        cat > app/src/main/java/com/meshmessenger/MainActivity.java << 'JAVAEOF'
        package com.meshmessenger;
        
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.view.WindowManager;
        import android.view.KeyEvent;
        
        public class MainActivity extends Activity {
            private WebView webView;
            
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                webView = new WebView(this);
                setContentView(webView);
                
                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setAllowFileAccess(true);
                webSettings.setAllowContentAccess(true);
                webSettings.setGeolocationEnabled(true);
                webSettings.setDatabaseEnabled(true);
                webSettings.setMediaPlaybackRequiresUserGesture(false);
                webSettings.setLoadWithOverviewMode(true);
                webSettings.setUseWideViewPort(true);
                
                webView.setWebViewClient(new WebViewClient());
                webView.setWebChromeClient(new WebChromeClient());
                
                webView.loadUrl("file:///android_asset/index.html");
                
                getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
            }
            
            @Override
            public boolean onKeyDown(int keyCode, KeyEvent event) {
                if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                    webView.goBack();
                    return true;
                }
                return super.onKeyDown(keyCode, event);
            }
        }
        JAVAEOF
    
    - name: Create Resource Files
      run: |
        # styles.xml
        cat > app/src/main/res/values/styles.xml << 'STYLEEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowFullscreen">true</item>
                <item name="android:statusBarColor">@android:color/transparent</item>
            </style>
        </resources>
        STYLEEOF
        
        # colors.xml
        cat > app/src/main/res/values/colors.xml << 'COLOREOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="primary">#6C63FF</color>
            <color name="secondary">#FF6584</color>
            <color name="dark">#1a1a2e</color>
        </resources>
        COLOREOF
        
        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'STRINGEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Mesh Messenger</string>
        </resources>
        STRINGEOF
    
    - name: Create Gradle Build Files
      run: |
        # Root build.gradle
        cat > build.gradle << 'ROOTGRADLEEOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        
        tasks.register('clean', Delete) {
            delete rootProject.layout.buildDirectory
        }
        ROOTGRADLEEOF
        
        # App build.gradle
        cat > app/build.gradle << 'APPGRADLEEOF'
        plugins {
            id 'com.android.application'
        }
        
        android {
            namespace 'com.meshmessenger'
            compileSdk 34
            
            defaultConfig {
                applicationId "com.meshmessenger"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
                
                testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        APPGRADLEEOF
        
        # settings.gradle
        cat > settings.gradle << 'SETTINGSEOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "MeshMessenger"
        include ':app'
        SETTINGSEOF
        
        # gradle.properties
        cat > gradle.properties << 'PROPEOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        android.nonTransitiveRClass=true
        PROPEOF
        
        # proguard-rules.pro
        cat > app/proguard-rules.pro << 'PROGUARDEOF'
        -keep class com.meshmessenger.** { *; }
        -keepattributes *Annotation*
        PROGUARDEOF
    
    - name: Generate Gradle Wrapper
      run: |
        # Download gradle wrapper
        gradle wrapper --gradle-version 8.5
        
        # Verify wrapper exists
        ls -la gradlew
        
        # Make executable
        chmod +x gradlew
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease
    
    - name: List APK Files
      run: |
        echo "=== Debug APKs ==="
        find app/build -name "*.apk" -type f
        echo ""
        echo "=== File Sizes ==="
        ls -lh app/build/outputs/apk/debug/
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MeshMessenger-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MeshMessenger-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
    
    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "Mesh Messenger v1.0.${{ github.run_number }}"
        body: |
          ## 📡 Mesh Messenger - Offline P2P Chat App
          
          ### ✨ Features:
          - 🚫 Works completely offline
          - 📱 P2P mesh network communication
          - 🔍 Auto-discover nearby devices
          - 💬 Real-time messaging
          - 🎨 Beautiful Material Design UI
          - 📶 Uses Bluetooth & WiFi Direct
          
          ### 📲 Installation:
          1. Download APK file
          2. Enable "Install from unknown sources"
          3. Install and open app
          4. Grant required permissions
          5. Start chatting!
          
          ### 🔧 Requirements:
          - Android 5.0+
          - Bluetooth & Location enabled
          
          ### 🏗️ Build Information:
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      run: |
        echo "========================================="
        echo "🎉 Build Completed Successfully!"
        echo "========================================="
        echo "📱 Debug APK: app/build/outputs/apk/debug/"
        echo "📱 Release APK: app/build/outputs/apk/release/"
        echo "📦 Check 'Artifacts' section to download"
        echo "========================================="
