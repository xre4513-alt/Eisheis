# .github/workflows/build-apk.yml
name: Build Mesh Messenger APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/meshmessenger
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper
        
        cp index.html app/src/main/assets/
    
    - name: Create Launcher Icon
      run: |
        cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ICONEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <group android:translateX="22" android:translateY="22">
                <path
                    android:fillColor="#6C63FF"
                    android:pathData="M32,2C15.43,2 2,15.43 2,32s13.43,30 30,30s30,-13.43 30,-30S48.57,2 32,2zM32,52c-11.05,0 -20,-8.95 -20,-20s8.95,-20 20,-20s20,8.95 20,20S43.05,52 32,52z"/>
                <path
                    android:fillColor="#FF6584"
                    android:pathData="M20,32h24l-12,16z"/>
            </group>
        </vector>
        ICONEOF
        
        cat > app/src/main/res/drawable/ic_launcher_background.xml << 'BACKEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#1a1a2e"
                android:pathData="M0,0h108v108H0z"/>
        </vector>
        BACKEOF
        
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ADAPTEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
        </adaptive-icon>
        ADAPTEOF
    
    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.BLUETOOTH" />
            <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Mesh Messenger"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                android:usesCleartextTraffic="true">
                
                <activity
                    android:name="com.meshmessenger.MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize"
                    android:screenOrientation="portrait">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFESTEOF
    
    - name: Create MainActivity.java
      run: |
        cat > app/src/main/java/com/meshmessenger/MainActivity.java << 'JAVAEOF'
        package com.meshmessenger;
        
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.view.WindowManager;
        import android.view.KeyEvent;
        
        public class MainActivity extends Activity {
            private WebView webView;
            
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                webView = new WebView(this);
                setContentView(webView);
                
                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setAllowFileAccess(true);
                webSettings.setAllowContentAccess(true);
                webSettings.setGeolocationEnabled(true);
                webSettings.setDatabaseEnabled(true);
                webSettings.setMediaPlaybackRequiresUserGesture(false);
                webSettings.setLoadWithOverviewMode(true);
                webSettings.setUseWideViewPort(true);
                
                webView.setWebViewClient(new WebViewClient());
                webView.setWebChromeClient(new WebChromeClient());
                
                webView.loadUrl("file:///android_asset/index.html");
                
                getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
            }
            
            @Override
            public boolean onKeyDown(int keyCode, KeyEvent event) {
                if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                    webView.goBack();
                    return true;
                }
                return super.onKeyDown(keyCode, event);
            }
        }
        JAVAEOF
    
    - name: Create Resource Files
      run: |
        cat > app/src/main/res/values/styles.xml << 'STYLEEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowFullscreen">true</item>
                <item name="android:statusBarColor">@android:color/transparent</item>
            </style>
        </resources>
        STYLEEOF
        
        cat > app/src/main/res/values/colors.xml << 'COLOREOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="primary">#6C63FF</color>
            <color name="secondary">#FF6584</color>
            <color name="dark">#1a1a2e</color>
        </resources>
        COLOREOF
        
        cat > app/src/main/res/values/strings.xml << 'STRINGEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Mesh Messenger</string>
        </resources>
        STRINGEOF
    
    - name: Create Gradle Build Files
      run: |
        cat > build.gradle << 'ROOTGRADLEEOF'
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        ROOTGRADLEEOF
        
        cat > app/build.gradle << 'APPGRADLEEOF'
        plugins {
            id 'com.android.application'
        }
        
        android {
            namespace 'com.meshmessenger'
            compileSdk 34
            
            defaultConfig {
                applicationId "com.meshmessenger"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        APPGRADLEEOF
        
        cat > settings.gradle << 'SETTINGSEOF'
        pluginManagement {
            repositories {
                google {
                    content {
                        includeGroupByRegex("com\\.android.*")
                        includeGroupByRegex("com\\.google.*")
                        includeGroupByRegex("androidx.*")
                    }
                }
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "MeshMessenger"
        include ':app'
        SETTINGSEOF
        
        cat > gradle.properties << 'PROPEOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        android.nonTransitiveRClass=true
        PROPEOF
        
        cat > app/proguard-rules.pro << 'PROGUARDEOF'
        -keep class com.meshmessenger.** { *; }
        PROGUARDEOF
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPEREOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAPPEREOF
    
    - name: Setup Gradle Wrapper
      run: |
        wget https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew
        mkdir -p gradle/wrapper
        wget https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Build Release APK  
      run: ./gradlew assembleRelease --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MeshMessenger-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MeshMessenger-Release-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
    
    - name: Show Download Info
      run: |
        echo "========================================="
        echo "✅ BUILD SUCCESSFUL!"
        echo "========================================="
        echo "📱 APK ready for download!"
        echo ""
        echo "Download from 'Artifacts' section:"
        echo "1. MeshMessenger-Debug-APK"
        echo "2. MeshMessenger-Release-APK"
        echo ""
        echo "Or use direct link:"
        echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        echo "========================================="
