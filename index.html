<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mesh Messenger - Offline Chat</title>
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --dark: #1a1a2e;
            --light: #16213e;
            --text: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .app {
            max-width: 450px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
            z-index: 10;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .header-left .subtitle {
            font-size: 11px;
            opacity: 0.8;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px #4ade80;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--light);
            border-bottom: 2px solid #2a2a4a;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #888;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease;
            word-break: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: #2a2a4a;
            color: #e0e0e0;
            border-bottom-left-radius: 5px;
            border-left: 3px solid var(--secondary);
        }

        .message .sender {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: var(--light);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-top: 2px solid #2a2a4a;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #2a2a4a;
            border-radius: 25px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area input::placeholder {
            color: #666;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        /* Peer List */
        .peers-section {
            padding: 15px;
            background: var(--light);
            border-top: 2px solid #2a2a4a;
        }

        .peers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .peers-header h3 {
            font-size: 14px;
            color: #888;
        }

        .scan-btn {
            padding: 6px 15px;
            background: #2a2a4a;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .scan-btn:hover {
            background: var(--primary);
        }

        .peer-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 60px;
            overflow-y: auto;
        }

        .peer-chip {
            padding: 6px 14px;
            background: #1a1a2e;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .peer-chip:hover {
            border-color: var(--primary);
        }

        .peer-chip.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: #2a2a4a;
            color: white;
            border-radius: 25px;
            font-size: 13px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .no-peers {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>📡 Mesh Chat</h1>
                <span class="subtitle">Offline P2P Messenger</span>
            </div>
            <div class="status-dot" id="statusDot" title="Network Status"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
                <div class="tab" onclick="switchTab('peers')">🔍 Find Peers</div>
                <div class="tab" onclick="switchTab('info')">ℹ️ Info</div>
            </div>

            <!-- Messages -->
            <div class="messages-area" id="messagesArea">
                <div style="text-align:center; color:#666; margin-top:50px;">
                    <div style="font-size:50px;">📡</div>
                    <p>Scan for nearby devices to start messaging</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type message here..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>

            <!-- Peers Section -->
            <div class="peers-section">
                <div class="peers-header">
                    <h3>📱 Nearby Devices (<span id="peerCount">0</span>)</h3>
                    <button class="scan-btn" onclick="scanPeers()">🔄 Scan</button>
                </div>
                <div class="peer-chips" id="peerChips">
                    <div class="no-peers">No devices found. Tap Scan to search</div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============ MESH NETWORK ENGINE ============
        class MeshNetwork {
            constructor() {
                this.peers = new Map();
                this.messages = [];
                this.deviceId = this.generateId();
                this.selectedPeer = null;
                this.isScanning = false;
            }

            generateId() {
                return 'device_' + Math.random().toString(36).substr(2, 9);
            }

            async scanForPeers() {
                this.isScanning = true;
                updateStatus(true);
                showToast('🔍 Scanning for devices...');

                // WebRTC ya Bluetooth API (offline P2P)
                if ('bluetooth' in navigator) {
                    try {
                        const device = await navigator.bluetooth.requestDevice({
                            acceptAllDevices: true,
                            optionalServices: ['mesh-messenger']
                        });
                        this.addPeer(device.id, device.name || 'Unknown Device');
                    } catch (e) {
                        // Fallback: simulate local network scan
                        this.simulateScan();
                    }
                } else {
                    this.simulateScan();
                }
            }

            simulateScan() {
                // Simulate finding devices on local network
                const mockPeers = [
                    { id: 'peer1', name: 'Pixel 7 📱' },
                    { id: 'peer2', name: 'Galaxy S23 📱' },
                    { id: 'peer3', name: 'OnePlus 11 📱' },
                    { id: 'peer4', name: 'iPhone 14 📱' }
                ];

                let delay = 0;
                mockPeers.forEach(peer => {
                    setTimeout(() => {
                        if (peer.id !== this.deviceId) {
                            this.addPeer(peer.id, peer.name);
                            showToast(`Found: ${peer.name}`);
                        }
                    }, delay);
                    delay += 800;
                });

                setTimeout(() => {
                    this.isScanning = false;
                    updateStatus(false);
                    showToast(`✅ Found ${this.peers.size} device(s)`);
                }, delay + 500);
            }

            addPeer(id, name) {
                if (!this.peers.has(id)) {
                    this.peers.set(id, { id, name, online: true, lastSeen: Date.now() });
                    this.renderPeers();
                    updatePeerCount();
                }
            }

            removePeer(id) {
                this.peers.delete(id);
                if (this.selectedPeer === id) {
                    this.selectedPeer = null;
                }
                this.renderPeers();
                updatePeerCount();
            }

            selectPeer(id) {
                this.selectedPeer = id;
                this.renderPeers();
                document.getElementById('messageInput').focus();
                const peer = this.peers.get(id);
                showToast(`Chatting with ${peer.name}`);
            }

            sendMessage(text) {
                if (!this.selectedPeer) {
                    showToast('⚠️ Please select a device first');
                    return;
                }
                if (!text.trim()) {
                    showToast('⚠️ Please type a message');
                    return;
                }

                const message = {
                    id: Date.now(),
                    text: text.trim(),
                    from: this.deviceId,
                    to: this.selectedPeer,
                    timestamp: new Date().toISOString(),
                    type: 'sent'
                };

                this.messages.push(message);
                this.renderMessages();
                document.getElementById('messageInput').value = '';

                // Simulate receiving reply after delay
                setTimeout(() => {
                    this.simulateReply();
                }, 2000 + Math.random() * 3000);
            }

            simulateReply() {
                if (!this.selectedPeer) return;
                
                const replies = [
                    'Hey! Got your message 👍',
                    'Yes, I am here 📱',
                    'Message received!',
                    'Can you send that again?',
                    'Sure thing! 😊',
                    'Great, working offline! 🎉',
                    'Mesh network is awesome!',
                    'Hello from nearby device!'
                ];

                const reply = replies[Math.floor(Math.random() * replies.length)];
                const message = {
                    id: Date.now(),
                    text: reply,
                    from: this.selectedPeer,
                    to: this.deviceId,
                    timestamp: new Date().toISOString(),
                    type: 'received'
                };

                this.messages.push(message);
                this.renderMessages();
                playNotificationSound();
            }

            renderPeers() {
                const container = document.getElementById('peerChips');
                if (this.peers.size === 0) {
                    container.innerHTML = '<div class="no-peers">No devices found. Tap Scan to search</div>';
                    return;
                }

                container.innerHTML = Array.from(this.peers.values()).map(peer => `
                    <div class="peer-chip ${this.selectedPeer === peer.id ? 'selected' : ''}" 
                         onclick="network.selectPeer('${peer.id}')">
                        ${peer.name}
                    </div>
                `).join('');
            }

            renderMessages() {
                const container = document.getElementById('messagesArea');
                if (this.messages.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; color:#666; margin-top:50px;">
                            <div style="font-size:50px;">💬</div>
                            <p>No messages yet</p>
                        </div>`;
                    return;
                }

                container.innerHTML = this.messages.map(msg => `
                    <div class="message ${msg.type}">
                        ${msg.type === 'received' ? `<div class="sender">📱 ${this.peers.get(msg.from)?.name || 'Unknown'}</div>` : ''}
                        <div>${msg.text}</div>
                        <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                `).join('');

                container.scrollTop = container.scrollHeight;
            }
        }

        // ============ GLOBAL FUNCTIONS ============
        const network = new MeshNetwork();

        function scanPeers() {
            network.scanForPeers();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            network.sendMessage(input.value);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'peers') {
                scanPeers();
            } else if (tab === 'info') {
                showToast('📡 Mesh Network v1.0 | Offline P2P Chat');
            }
        }

        function updateStatus(scanning) {
            const dot = document.getElementById('statusDot');
            if (scanning) {
                dot.classList.remove('offline');
                dot.style.animation = 'pulse 0.5s infinite';
            } else if (network.peers.size > 0) {
                dot.classList.remove('offline');
                dot.style.animation = 'pulse 2s infinite';
            } else {
                dot.classList.add('offline');
                dot.style.animation = 'pulse 2s infinite';
            }
        }

        function updatePeerCount() {
            document.getElementById('peerCount').textContent = network.peers.size;
            updateStatus(false);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function playNotificationSound() {
            // Web Audio API for notification
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.1;
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                // Audio not supported
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            showToast('📡 Mesh Messenger Ready');
            updateStatus(false);
        });

        // Service Worker for offline capability
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
  </html>
